version: "3.7"

services:
  web:
    build:
      context: ./bredrock
      dockerfile: ./deployment/Dockerfile.prod
    image: docker.verscend.net/bredrock:latest
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8081
    volumes:
      - static_volume:/home/app/web/static
    ports:
      - 8081
    env_file:
      - ./.env.prod
    depends_on:
      - db
    container_name: bredrock_web
  db:
    image: postgres:12.0-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env.prod.db
    container_name: bredrock_db
  pgadmin:
    image: dpage/pgadmin4
    depends_on:
      - db
    ports:
      - 5445:80
    env_file:
      - ./.env.prod.pgadmin
    restart: always
    container_name: bredrock_pgadmin
  nginx:
    build:
      context: ./bredrock/deployment
      dockerfile: Dockerfile.nginx
    volumes:
      - static_volume:/home/app/web/static
    ports:
      - 9090:80
    depends_on:
      - web
    container_name: bredrock_nginx

volumes:
  postgres_data:
  static_volume:
