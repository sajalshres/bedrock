version: "3.7"

services:
  web:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    command: gunicorn hello_django.wsgi:application --bind 0.0.0.0:8081
    ports:
      - 8081:8081
    env_file:
      - ./.env.prod
    depends_on:
      - db
    container_name: bedrock_web

  db:
    image: postgres:12.0-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - ./.env.prod.db
    container_name: bedrock_db

volumes:
  postgres_data:
